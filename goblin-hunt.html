<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loot Goblin Hunt</title>

<style>

body{
background:#0a0a0a;
color:#d6c8a5;
font-family:Arial;
text-align:center;
}

h1{
color:#d4af37;
}

#gameArea{
width:900px;
height:480px;
margin:auto;
border:2px solid #444;
background:#151515;
position:relative;
overflow:hidden;
}

#goblin{
position:absolute;
width:64px;
cursor:pointer;
transition:0.25s linear;
}

.coin{
position:absolute;
font-size:22px;
cursor:pointer;
}

.damage{
position:absolute;
color:#ff4444;
font-weight:bold;
animation:float 1s forwards;
}

@keyframes float{
0%{opacity:1;transform:translateY(0)}
100%{opacity:0;transform:translateY(-60px)}
}

#ui{
margin-top:10px;
}

#inventory{
margin-top:15px;
padding:10px;
border:1px solid #444;
width:400px;
margin-left:auto;
margin-right:auto;
background:#111;
}

.invItem{
display:inline-block;
margin:5px;
padding:4px 8px;
border:1px solid #555;
background:#222;
}

#leaderboard{
margin-top:15px;
border:1px solid #444;
width:300px;
margin-left:auto;
margin-right:auto;
padding:10px;
background:#111;
}

#gameOver{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:28px;
}

button{
padding:8px 16px;
background:#333;
color:white;
border:1px solid #777;
cursor:pointer;
}

</style>
</head>

<body>

<h1>🧌 Loot Goblin Hunt</h1>

<div id="gameArea">

<img id="goblin" src="https://i.imgur.com/3XKXQ4K.png">

<div id="gameOver">
Game Over<br>
<button onclick="startGame()">Play Again</button>
</div>

</div>

<div id="ui">

<button onclick="startGame()">Start Hunt</button>

<div>Time: <span id="timer">25</span></div>
<div>Kills: <span id="score">0</span></div>
<div>Gold: <span id="gold">0</span></div>

</div>

<div id="inventory">
<strong>Inventory</strong><br>
<div id="invList"></div>
</div>

<div id="leaderboard">
<strong>Top Scores</strong>
<div id="scores"></div>
</div>

<script>

let goblinHP=6
let maxHP=6
let score=0
let timer=25
let gold=0

let running=false
let moveLoop
let timeLoop

let inventory=[]

const goblin=document.getElementById("goblin")
const timerUI=document.getElementById("timer")
const scoreUI=document.getElementById("score")
const goldUI=document.getElementById("gold")
const invList=document.getElementById("invList")
const scoresUI=document.getElementById("scores")
const gameOverUI=document.getElementById("gameOver")

function startGame(){

running=true
score=0
gold=0
timer=25
inventory=[]

updateInventory()

scoreUI.innerText=score
goldUI.innerText=gold
timerUI.innerText=timer

gameOverUI.style.display="none"

spawnGoblin()

moveLoop=setInterval(moveGoblin,600)

timeLoop=setInterval(()=>{

timer--
timerUI.innerText=timer

if(timer<=0)endGame()

},1000)

}

function spawnGoblin(){

goblinHP=maxHP
moveGoblin()

}

function moveGoblin(){

if(!running)return

let area=document.getElementById("gameArea")

let x=Math.random()*(area.clientWidth-80)
let y=Math.random()*(area.clientHeight-80)

goblin.style.left=x+"px"
goblin.style.top=y+"px"

}

goblin.onclick=function(e){

if(!running)return

let dmg=1

if(Math.random()<0.2)dmg=2

goblinHP-=dmg

spawnDamage(e.clientX,e.clientY,dmg)

spawnCoins()

if(goblinHP<=0){

score++
scoreUI.innerText=score

dropLoot()

spawnGoblin()

}

}

function spawnCoins(){

let area=document.getElementById("gameArea")

for(let i=0;i<3;i++){

let coin=document.createElement("div")

coin.className="coin"
coin.innerText="🪙"

coin.style.left=goblin.style.left
coin.style.top=goblin.style.top

coin.onclick=function(){

gold+=5
goldUI.innerText=gold
coin.remove()

}

area.appendChild(coin)

}

}

function spawnDamage(x,y,dmg){

let d=document.createElement("div")

d.className="damage"

d.innerText=dmg

d.style.left=(x-450)+"px"
d.style.top=(y-120)+"px"

document.getElementById("gameArea").appendChild(d)

setTimeout(()=>d.remove(),1000)

}

function dropLoot(){

const table=[

"El Rune",
"Tir Rune",
"Tal Rune",
"Magic Ring",
"Rare Gloves",
"Magic Sword"

]

let drop=table[Math.floor(Math.random()*table.length)]

inventory.push(drop)

updateInventory()

}

function updateInventory(){

invList.innerHTML=""

inventory.forEach(item=>{

let div=document.createElement("div")
div.className="invItem"
div.innerText=item

invList.appendChild(div)

})

}

function endGame(){

running=false

clearInterval(moveLoop)
clearInterval(timeLoop)

saveScore(score)

gameOverUI.style.display="flex"

}

function saveScore(s){

let scores=JSON.parse(localStorage.getItem("goblinScores")||"[]")

scores.push(s)

scores.sort((a,b)=>b-a)

scores=scores.slice(0,5)

localStorage.setItem("goblinScores",JSON.stringify(scores))

renderScores()

}

function renderScores(){

let scores=JSON.parse(localStorage.getItem("goblinScores")||"[]")

scoresUI.innerHTML=""

scores.forEach(s=>{

let div=document.createElement("div")
div.innerText=s+" kills"

scoresUI.appendChild(div)

})

}

renderScores()

</script>

</body>
</html>
