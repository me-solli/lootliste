<script>

let player={
hp:30,
maxHP:30,
gold:0,
damage:4,
defense:0
}

let rooms=0
let monster=null
let chest=false

let inventory=[]

const hpUI=document.getElementById("hp")
const goldUI=document.getElementById("gold")
const roomsUI=document.getElementById("rooms")
const roomUI=document.getElementById("room")
const logUI=document.getElementById("log")

function log(t){

logUI.innerHTML+="<div>"+t+"</div>"
logUI.scrollTop=logUI.scrollHeight

}

function updateUI(){

hpUI.innerText=player.hp+"/"+player.maxHP
goldUI.innerText=player.gold
roomsUI.innerText=rooms

}

function nextRoom(){

rooms++

monster=null
chest=false

let roll=Math.random()

if(roll<0.4){

spawnMonster()

}
else if(roll<0.7){

spawnChest()

}
else{

roomUI.innerText="💰"

let g=5+Math.floor(Math.random()*10)
player.gold+=g

log("Found "+g+" gold")

}

updateUI()

}

function spawnMonster(){

monster={
hp:12,
dmg:3
}

roomUI.innerText="👹"

log("A monster appears!")

}

function spawnChest(){

chest=true

roomUI.innerText="📦"

log("A treasure chest!")

}

function attack(){

if(!monster){

log("Nothing to attack.")
return

}

monster.hp-=player.damage

log("You hit monster for "+player.damage)

if(monster.hp<=0){

log("Monster defeated!")

player.gold+=10

monster=null
roomUI.innerText="☠"

updateUI()

return

}

let dmg=Math.max(0,monster.dmg-player.defense)

player.hp-=dmg

log("Monster hits you for "+dmg)

if(player.hp<=0){

log("You died. Restart.")

player.hp=player.maxHP
player.gold=0
rooms=0
inventory=[]

updateInventory()

}

updateUI()

}

function openChest(){

if(!chest){

log("No chest here.")
return

}

let item=rollItem()

inventory.push(item)

log("Found: "+item.name)

updateInventory()

chest=false
roomUI.innerText="🪙"

}

function rollItem(){

const items=[

{name:"Magic Ring (+2 Life)",type:"life",value:2},
{name:"Iron Sword (+2 Damage)",type:"damage",value:2},
{name:"Leather Armor (+1 Defense)",type:"defense",value:1},
{name:"Potion (+10 Life)",type:"heal",value:10}

]

return items[Math.floor(Math.random()*items.length)]

}

function updateInventory(){

let div=document.getElementById("items")

div.innerHTML=""

inventory.forEach((item,index)=>{

let e=document.createElement("div")

e.className="item"

e.innerText=item.name

e.onclick=function(){

useItem(index)

}

div.appendChild(e)

})

}

function useItem(i){

let item=inventory[i]

if(item.type=="life"){

player.maxHP+=item.value
player.hp+=item.value

log("Max HP increased!")

}

if(item.type=="damage"){

player.damage+=item.value

log("Damage increased!")

}

if(item.type=="defense"){

player.defense+=item.value

log("Defense increased!")

}

if(item.type=="heal"){

player.hp=Math.min(player.maxHP,player.hp+item.value)

log("Healed!")

}

inventory.splice(i,1)

updateInventory()
updateUI()

}

updateUI()

</script>
