<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dungeon Chest Run</title>

<style>

body{
background:#0c0c0c;
color:#d6c8a5;
font-family:Arial;
text-align:center;
}

#game{
width:600px;
margin:auto;
}

#room{
height:200px;
border:2px solid #444;
background:#111;
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
margin-top:10px;
}

button{
padding:8px 14px;
margin:5px;
background:#333;
color:white;
border:1px solid #777;
cursor:pointer;
}

#log{
height:120px;
overflow:auto;
border:1px solid #444;
background:#111;
padding:8px;
text-align:left;
margin-top:10px;
}

#inventory{
margin-top:10px;
border:1px solid #444;
background:#111;
padding:8px;
}

.item{
display:inline-block;
border:1px solid #555;
padding:4px;
margin:3px;
}

</style>
</head>

<body>

<h2>⚔ Dungeon Chest Run</h2>

<div id="game">

<div>
HP: <span id="hp"></span> |
Gold: <span id="gold"></span> |
Rooms: <span id="rooms"></span>
</div>

<div id="room">🚪</div>

<div>

<button onclick="nextRoom()">Enter Room</button>
<button onclick="attack()">Attack</button>
<button onclick="openChest()">Open Chest</button>

</div>

<div id="log"></div>

<div id="inventory">
<strong>Loot</strong>
<div id="items"></div>
</div>

</div>

<script>

let player={
hp:30,
gold:0
}

let rooms=0
let monster=null
let chest=false

let inventory=[]

const hpUI=document.getElementById("hp")
const goldUI=document.getElementById("gold")
const roomsUI=document.getElementById("rooms")
const roomUI=document.getElementById("room")
const logUI=document.getElementById("log")

function log(t){

logUI.innerHTML+="<div>"+t+"</div>"
logUI.scrollTop=logUI.scrollHeight

}

function updateUI(){

hpUI.innerText=player.hp
goldUI.innerText=player.gold
roomsUI.innerText=rooms

}

function nextRoom(){

rooms++

monster=null
chest=false

let roll=Math.random()

if(roll<0.4){

spawnMonster()

}
else if(roll<0.7){

spawnChest()

}
else{

roomUI.innerText="💰"

let g=5+Math.floor(Math.random()*10)
player.gold+=g

log("Found "+g+" gold")

}

updateUI()

}

function spawnMonster(){

monster={hp:12,dmg:3}

roomUI.innerText="👹"

log("A monster appears!")

}

function spawnChest(){

chest=true

roomUI.innerText="📦"

log("A treasure chest!")

}

function attack(){

if(!monster){

log("Nothing to attack.")
return

}

monster.hp-=4

log("You hit monster.")

if(monster.hp<=0){

log("Monster defeated!")

player.gold+=10

monster=null
roomUI.innerText="☠"

updateUI()

return

}

player.hp-=monster.dmg

log("Monster hits you.")

if(player.hp<=0){

log("You died. Restart.")

player.hp=30
player.gold=0
rooms=0
inventory=[]

updateInventory()

}

updateUI()

}

function openChest(){

if(!chest){

log("No chest here.")
return

}

let item=rollItem()

inventory.push(item)

log("Found: "+item)

updateInventory()

chest=false
roomUI.innerText="🪙"

}

function rollItem(){

const items=[

"El Rune",
"Tir Rune",
"Magic Ring",
"Rare Gloves",
"Magic Sword"

]

return items[Math.floor(Math.random()*items.length)]

}

function updateInventory(){

let div=document.getElementById("items")

div.innerHTML=""

inventory.forEach(i=>{

let e=document.createElement("div")

e.className="item"

e.innerText=i

div.appendChild(e)

})

}

updateUI()

</script>

</body>
</html>
