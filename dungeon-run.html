<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dungeon Loot</title>

<style>

body{
background:#0c0c0c;
color:#d6c8a5;
font-family:Arial;
text-align:center;
}

#game{
width:600px;
margin:auto;
}

#room{
height:200px;
border:2px solid #444;
background:#111;
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
margin-top:10px;
}

button{
padding:8px 14px;
margin:5px;
background:#333;
color:white;
border:1px solid #777;
cursor:pointer;
}

#log{
height:120px;
overflow:auto;
border:1px solid #444;
background:#111;
padding:8px;
text-align:left;
margin-top:10px;
}

#inventory{
margin-top:10px;
border:1px solid #444;
background:#111;
padding:8px;
}

.item{
display:inline-block;
border:1px solid #555;
padding:4px;
margin:3px;
cursor:pointer;
background:#222;
}

</style>

</head>

<body>

<h2>⚔ Dungeon Loot</h2>

<div id="game">

<div>
HP: <span id="hp"></span> |
Damage: <span id="damage"></span> |
Defense: <span id="defense"></span> |
Gold: <span id="gold"></span> |
Rooms: <span id="rooms"></span>
</div>

<div id="room">🚪</div>

<div>

<button onclick="enterRoom()">Enter Room</button>
<button onclick="attack()">Attack</button>
<button onclick="openChest()">Open Chest</button>

</div>

<div id="log"></div>

<div id="inventory">
<strong>Inventory (click item to use)</strong>
<div id="items"></div>
</div>

</div>

<script>

let player={
hp:30,
maxHP:30,
damage:4,
defense:0,
gold:0
}

let rooms=0
let monster=null
let chest=false

let inventory=[]

const hpUI=document.getElementById("hp")
const dmgUI=document.getElementById("damage")
const defUI=document.getElementById("defense")
const goldUI=document.getElementById("gold")
const roomsUI=document.getElementById("rooms")

const roomUI=document.getElementById("room")
const logUI=document.getElementById("log")

function log(text){

logUI.innerHTML+="<div>"+text+"</div>"
logUI.scrollTop=logUI.scrollHeight

}

function updateUI(){

hpUI.innerText=player.hp+"/"+player.maxHP
dmgUI.innerText=player.damage
defUI.innerText=player.defense
goldUI.innerText=player.gold
roomsUI.innerText=rooms

}

function enterRoom(){

rooms++

monster=null
chest=false

let roll=Math.random()

if(roll<0.4){

spawnMonster()

}
else if(roll<0.7){

spawnChest()

}
else{

roomUI.innerText="💰"

let g=5+Math.floor(Math.random()*10)
player.gold+=g

log("You found "+g+" gold.")

}

updateUI()

}

function spawnMonster(){

monster={
hp:12,
dmg:3
}

roomUI.innerText="👹"

log("A monster appears!")

}

function spawnChest(){

chest=true

roomUI.innerText="📦"

log("A treasure chest!")

}

function attack(){

if(!monster){

log("No monster here.")
return

}

monster.hp-=player.damage

log("You hit the monster for "+player.damage)

if(monster.hp<=0){

log("Monster defeated!")

player.gold+=10

monster=null
roomUI.innerText="☠"

updateUI()

return

}

let dmg=Math.max(0,monster.dmg-player.defense)

player.hp-=dmg

log("Monster hits you for "+dmg)

if(player.hp<=0){

log("You died. Game reset.")

resetGame()

}

updateUI()

}

function openChest(){

if(!chest){

log("No chest here.")
return

}

let item=rollItem()

inventory.push(item)

log("Found item: "+item.name)

updateInventory()

chest=false
roomUI.innerText="🪙"

}

function rollItem(){

const items=[

{name:"Magic Ring (+3 Life)",type:"life",value:3},
{name:"Iron Sword (+2 Damage)",type:"damage",value:2},
{name:"Leather Armor (+1 Defense)",type:"defense",value:1},
{name:"Potion (+10 HP)",type:"heal",value:10}

]

return items[Math.floor(Math.random()*items.length)]

}

function updateInventory(){

let div=document.getElementById("items")

div.innerHTML=""

inventory.forEach((item,index)=>{

let el=document.createElement("div")

el.className="item"

el.innerText=item.name

el.onclick=function(){

useItem(index)

}

div.appendChild(el)

})

}

function useItem(i){

let item=inventory[i]

if(item.type==="life"){

player.maxHP+=item.value
player.hp+=item.value

log("Max HP increased!")

}

if(item.type==="damage"){

player.damage+=item.value

log("Damage increased!")

}

if(item.type==="defense"){

player.defense+=item.value

log("Defense increased!")

}

if(item.type==="heal"){

player.hp=Math.min(player.maxHP,player.hp+item.value)

log("You healed.")

}

inventory.splice(i,1)

updateInventory()
updateUI()

}

function resetGame(){

player.hp=30
player.maxHP=30
player.damage=4
player.defense=0
player.gold=0

rooms=0
inventory=[]

updateInventory()
updateUI()

}

updateUI()

</script>

</body>
</html>
