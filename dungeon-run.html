<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Diablo</title>

<style>

body{
background:#0a0a0a;
color:#d6c8a5;
text-align:center;
font-family:Arial;
}

canvas{
background:#111;
border:2px solid #444;
margin-top:10px;
}

#ui{
margin-top:10px;
}

#inventory{
margin-top:10px;
border:1px solid #444;
padding:8px;
width:300px;
margin-left:auto;
margin-right:auto;
background:#111;
}

.item{
border:1px solid #555;
margin:3px;
padding:3px;
display:inline-block;
}

</style>
</head>

<body>

<h2>⚔ Mini Diablo</h2>

<canvas id="game" width="640" height="640"></canvas>

<div id="ui">

HP: <span id="hp"></span> |
Gold: <span id="gold"></span>

</div>

<div id="inventory">

<strong>Inventory</strong>
<div id="items"></div>

</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const TILE=32
const SIZE=20

let map=[]

for(let y=0;y<SIZE;y++){

map[y]=[]

for(let x=0;x<SIZE;x++){

map[y][x]=Math.random()<0.15?1:0

}

}

let player={

x:2,
y:2,
hp:30,
gold:0

}

let monsters=[]
let inventory=[]

function spawnMonster(){

monsters.push({

x:Math.floor(Math.random()*SIZE),
y:Math.floor(Math.random()*SIZE),
hp:8

})

}

for(let i=0;i<6;i++)spawnMonster()

function draw(){

ctx.clearRect(0,0,640,640)

for(let y=0;y<SIZE;y++){

for(let x=0;x<SIZE;x++){

if(map[y][x]==1){

ctx.fillStyle="#333"

}else{

ctx.fillStyle="#1a1a1a"

}

ctx.fillRect(x*TILE,y*TILE,TILE,TILE)

}

}

ctx.fillStyle="blue"
ctx.fillRect(player.x*TILE,player.y*TILE,TILE,TILE)

ctx.fillStyle="red"

monsters.forEach(m=>{

ctx.fillRect(m.x*TILE,m.y*TILE,TILE,TILE)

})

}

function update(){

monsters.forEach(m=>{

let dx=player.x-m.x
let dy=player.y-m.y

if(Math.abs(dx)+Math.abs(dy)<6){

if(dx!=0)m.x+=dx>0?1:-1
else if(dy!=0)m.y+=dy>0?1:-1

}

if(m.x==player.x && m.y==player.y){

fight(m)

}

})

}

function fight(monster){

monster.hp-=3
player.hp-=2

if(monster.hp<=0){

player.gold+=10

if(Math.random()<0.4){

inventory.push("Rune")

updateInventory()

}

monsters.splice(monsters.indexOf(monster),1)

spawnMonster()

}

if(player.hp<=0){

player.hp=30
player.gold=Math.max(0,player.gold-20)
player.x=2
player.y=2

}

}

function updateInventory(){

let div=document.getElementById("items")

div.innerHTML=""

inventory.forEach(i=>{

let e=document.createElement("div")

e.className="item"
e.innerText=i

div.appendChild(e)

})

}

function move(dx,dy){

let nx=player.x+dx
let ny=player.y+dy

if(nx<0||ny<0||nx>=SIZE||ny>=SIZE)return
if(map[ny][nx]==1)return

player.x=nx
player.y=ny

}

document.addEventListener("keydown",e=>{

if(e.key=="w")move(0,-1)
if(e.key=="s")move(0,1)
if(e.key=="a")move(-1,0)
if(e.key=="d")move(1,0)

})

function loop(){

update()
draw()

document.getElementById("hp").innerText=player.hp
document.getElementById("gold").innerText=player.gold

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
