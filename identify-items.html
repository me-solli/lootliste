border:2px solid #666;

}

.unique{color:#c7b377;font-weight:bold;}

padding:6px;

}

}

#suggestions{

background:#111;
border:1px solid #444;

}

cursor:pointer;
}

.suggestion:hover{

}

margin-top:12px;
}

</style>

<body>

<h2>🧙 Identifiziere das Diablo-Item</h2>

<div id="tooltip"></div>

<input id="guess" placeholder="Itemname eingeben">
<div id="suggestions"></div>

<br>

<button onclick="checkAnswer()">Identifizieren</button>
<button onclick="nextItem()">Überspringen</button>

<div id="result"></div>

<div id="stats">
Punkte: <span id="score">0</span> |
Richtig: <span id="correct">0</span> |
Falsch: <span id="wrong">0</span> |
Serie: <span id="streak">0</span> |
Zeit: <span id="time">120</span>
</div>

<div>

let dailyItems=[]
let current

let score=0
let correct=0
let wrong=0
let streak=0
let time=120

const allNames=[]

items.forEach(i=>{
allNames.push(i.name)
if(i.aliases) i.aliases.forEach(a=>allNames.push(a))
})

function getDailyItems(){

let today=new Date().toDateString()

let stored=localStorage.getItem("d2DailyDate")

if(stored===today){

dailyItems=JSON.parse(localStorage.getItem("d2DailyItems"))

}
else{

dailyItems=[]

while(dailyItems.length<10){

let item=items[Math.floor(Math.random()*items.length)]

if(!dailyItems.includes(item))
dailyItems.push(item)

}

localStorage.setItem("d2DailyDate",today)
localStorage.setItem("d2DailyItems",JSON.stringify(dailyItems))

}

}

getDailyItems()

const timer=setInterval(()=>{

time--
document.getElementById("time").innerText=time

if(time<=0) endGame()

},1000)

function normalize(t){

return t.toLowerCase().replace(/[^a-zäöüß]/g,"")

}

function nextItem(){

document.getElementById("result").innerText=""
document.getElementById("guess").value=""
document.getElementById("suggestions").innerHTML=""

current=dailyItems[Math.floor(Math.random()*dailyItems.length)]

let html="<div class='gray'>Unidentifiziertes "+current.base+"</div><br>"

current.stats.forEach(stat=>{
html+="<div class='stat'>"+stat+"</div>"
})

document.getElementById("tooltip").innerHTML=html

}

function checkAnswer(){

let guess=normalize(document.getElementById("guess").value)

let answers=[normalize(current.name)]

if(current.aliases){
current.aliases.forEach(a=>{
answers.push(normalize(a))
})
}

if(answers.includes(guess)){

score+=10+(streak*2)
correct++
streak++

document.getElementById("result").innerHTML="✅ <span class='unique'>"+current.name+"</span>"

}
else{

wrong++
streak=0

document.getElementById("result").innerHTML="❌ Es war: "+current.name

}

updateStats()

setTimeout(nextItem,800)

}

function updateStats(){

document.getElementById("score").innerText=score
document.getElementById("correct").innerText=correct
document.getElementById("wrong").innerText=wrong
document.getElementById("streak").innerText=streak

}

function endGame(){

clearInterval(timer)

let high=localStorage.getItem("d2Highscore")||0

if(score>high){
localStorage.setItem("d2Highscore",score)
high=score
}

let daily=localStorage.getItem("d2DailyScore")||0

if(score>daily){
localStorage.setItem("d2DailyScore",score)
daily=score
}

document.getElementById("highscore").innerText=high
document.getElementById("daily").innerText=daily

alert("Spiel vorbei! Punkte: "+score)

location.reload()

}

document.getElementById("guess").addEventListener("input",function(){

let val=this.value.toLowerCase()

let sug=document.getElementById("suggestions")
sug.innerHTML=""

if(val.length<2) return

allNames.forEach(name=>{

if(name.toLowerCase().includes(val)){

let div=document.createElement("div")
div.className="suggestion"
div.innerText=name

div.onclick=function(){

document.getElementById("guess").value=name
sug.innerHTML=""

}

sug.appendChild(div)

}

})

})

document.getElementById("guess").addEventListener("keypress",function(e){

if(e.key==="Enter") checkAnswer()

})

document.getElementById("highscore").innerText=localStorage.getItem("d2Highscore")||0
document.getElementById("daily").innerText=localStorage.getItem("d2DailyScore")||0

nextItem()
