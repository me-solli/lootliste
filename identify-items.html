<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Identify the Item</title>

<style>

body{
background:#000;
color:#c7b377;
font-family:Tahoma,Arial;
text-align:center;
}

h2{
color:#d4af37;
}

#tooltip{
width:320px;
margin:25px auto;
padding:20px;
background:#000;
border:2px solid #666;
text-align:left;
font-size:15px;
box-shadow:0 0 20px black;
}

.stat{
color:#7fa6ff;
}

.unique{
color:#c7b377;
font-weight:bold;
}

.set{
color:#00ff00;
}

.rare{
color:#ffff66;
}

.gray{
color:#999;
}

input{
background:#111;
border:1px solid #555;
color:white;
padding:6px;
width:220px;
}

button{
margin-top:8px;
padding:6px 12px;
background:#333;
border:1px solid #777;
color:white;
cursor:pointer;
}

#stats{
margin-top:12px;
}

#result{
margin-top:10px;
font-size:18px;
}

</style>

</head>

<body>

<h2>🧙 Identify the Diablo Item</h2>

<div id="tooltip"></div>

<input id="guess" placeholder="Type item name">

<br>

<button onclick="checkAnswer()">Identify</button>
<button onclick="nextItem()">Skip</button>

<div id="result"></div>

<div id="stats">
Score: <span id="score">0</span> |
Correct: <span id="correct">0</span> |
Wrong: <span id="wrong">0</span> |
Streak: <span id="streak">0</span> |
Time: <span id="time">90</span>
</div>

<div>
Highscore: <span id="highscore">0</span>
</div>

<script>

const items=[

{
name:"Raven Frost",
type:"unique",
base:"Ring",
stats:[
"+150 Attack Rating",
"+20 Dexterity",
"Cannot Be Frozen"
]
},

{
name:"Nagelring",
type:"unique",
base:"Ring",
stats:[
"+30% Magic Find",
"+75 Attack Rating",
"+15 Defense"
]
},

{
name:"Stone of Jordan",
type:"unique",
base:"Ring",
stats:[
"+1 All Skills",
"+25% Max Mana",
"+20 Mana"
]
},

{
name:"Harlequin Crest",
type:"unique",
base:"Shako",
stats:[
"+2 All Skills",
"+2 Life per Level",
"+2 Mana per Level",
"10% Damage Reduction"
]
},

{
name:"Arachnid Mesh",
type:"unique",
base:"Spiderweb Sash",
stats:[
"+1 All Skills",
"20% Faster Cast Rate",
"Slow Target 10%"
]
},

{
name:"War Traveler",
type:"unique",
base:"Battle Boots",
stats:[
"+10 Strength",
"+10 Vitality",
"+30% Magic Find"
]
}

]

let current

let score=0
let correct=0
let wrong=0
let streak=0

let time=90

const timer=setInterval(()=>{

time--
document.getElementById("time").innerText=time

if(time<=0) endGame()

},1000)

function nextItem(){

document.getElementById("result").innerText=""
document.getElementById("guess").value=""

current=items[Math.floor(Math.random()*items.length)]

let html="<div class='gray'>Unidentified "+current.base+"</div><br>"

current.stats.forEach(stat=>{

html+="<div class='stat'>"+stat+"</div>"

})

document.getElementById("tooltip").innerHTML=html

}

function normalize(t){

return t.toLowerCase().replace(/[^a-z]/g,"")

}

function checkAnswer(){

let guess=normalize(document.getElementById("guess").value)
let answer=normalize(current.name)

if(guess===answer){

score+=10+(streak*2)
correct++
streak++

document.getElementById("result").innerHTML="✅ <span class='unique'>"+current.name+"</span>"

}
else{

wrong++
streak=0

document.getElementById("result").innerHTML="❌ "+current.name

}

updateStats()

setTimeout(nextItem,700)

}

function updateStats(){

document.getElementById("score").innerText=score
document.getElementById("correct").innerText=correct
document.getElementById("wrong").innerText=wrong
document.getElementById("streak").innerText=streak

}

function endGame(){

clearInterval(timer)

let high=localStorage.getItem("d2IdentifyHighscore")||0

if(score>high){

localStorage.setItem("d2IdentifyHighscore",score)
high=score

}

document.getElementById("highscore").innerText=high

alert("Game Over! Score: "+score)

location.reload()

}

document.getElementById("guess").addEventListener("keypress",function(e){

if(e.key==="Enter") checkAnswer()

})

document.getElementById("highscore").innerText=localStorage.getItem("d2IdentifyHighscore")||0

nextItem()

</script>

</body>
</html>
