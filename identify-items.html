<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Identifiziere das Diablo Item</title>

<style>

body{
background:#000;
color:#c7b377;
font-family:Tahoma,Arial;
text-align:center;
}

h2{
color:#d4af37;
margin-top:30px;
}

#tooltip{
width:380px;
margin:30px auto;
padding:20px;
background:#000;
border:2px solid #666;
text-align:left;
font-size:15px;
box-shadow:0 0 25px black;
}

.item-header{
display:flex;
gap:12px;
align-items:center;
margin-bottom:12px;
}

.item-icon{
width:48px;
height:48px;
}

.unique{
color:#d4af37;
font-weight:bold;
font-size:18px;
text-shadow:0 0 6px #000;
}

.item-base{
color:#888;
font-size:14px;
}

.stat{
color:#6da9ff;
margin-left:4px;
}

input{
background:#111;
border:1px solid #555;
color:white;
padding:8px;
width:260px;
margin-top:20px;
}

button{
margin-top:8px;
padding:6px 14px;
background:#333;
border:1px solid #777;
color:white;
cursor:pointer;
}

#suggestions{
position:absolute;
width:260px;
background:#111;
border:1px solid #444;
text-align:left;
left:50%;
transform:translateX(-50%);
z-index:1000;
}

.suggestion{
padding:6px;
cursor:pointer;
}

.suggestion:hover{
background:#333;
}

#stats{
margin-top:20px;
}

</style>
</head>

<body>

<h2>🧙 Identifiziere das Diablo Item</h2>

<div id="tooltip"></div>

<input id="guess" placeholder="Itemname eingeben">
<div id="suggestions"></div>

<br>

<button onclick="checkAnswer()">Identifizieren</button>
<button onclick="nextItem()">Überspringen</button>

<div id="result"></div>

<div id="stats">
Punkte: <span id="score">0</span> |
Richtig: <span id="correct">0</span> |
Falsch: <span id="wrong">0</span> |
Serie: <span id="streak">0</span> |
Zeit: <span id="time">120</span>
</div>

<div>
Highscore: <span id="highscore">0</span>
</div>

<script>

const items=[

{
name:"Rabenfrost",
aliases:["raven frost","raven"],
base:"Ring",
icon:"ring",
stats:[
"+150 Angriffswert",
"+20 Geschicklichkeit",
"Einfrieren nicht möglich"
]
},

{
name:"Stein von Jordan",
aliases:["soj","stone of jordan"],
base:"Ring",
icon:"ring",
stats:[
"+1 zu allen Fertigkeiten",
"+25% maximale Mana"
]
},

{
name:"Harlekinskrone",
aliases:["harle","shako"],
base:"Shako",
icon:"helm",
stats:[
"+2 zu allen Fertigkeiten",
"10% Schadensreduzierung"
]
},

{
name:"Kriegsreisender",
aliases:["wt","war traveler"],
base:"Kampfstiefel",
icon:"schuhe",
stats:[
"+10 Stärke",
"+30% Magic Find"
]
},

{
name:"Windforce",
aliases:["wf","windmacht"],
base:"Hydrabogen",
icon:"bogen",
stats:[
"+250% erhöhter Schaden",
"Knockback"
]
},

{
name:"Der Oculus",
aliases:["oculus","occ","okulus"],
base:"Schleierstab",
icon:"zauberstab",
stats:[
"+3 Zauberinnen Fertigkeiten",
"30% schnellere Zauberrate"
]
}

]

let current
let score=0
let correct=0
let wrong=0
let streak=0
let time=120

let suggestionIndex=-1

const allNames=[]

items.forEach(i=>{
allNames.push(i.name)
if(i.aliases) i.aliases.forEach(a=>allNames.push(a))
})

function normalize(t){
return t.toLowerCase().replace(/[^a-zäöüß]/g,"")
}

function nextItem(){

document.getElementById("guess").value=""
document.getElementById("result").innerText=""
document.getElementById("suggestions").innerHTML=""

suggestionIndex=-1

current=items[Math.floor(Math.random()*items.length)]

let iconPath=`img/icons/${current.icon}.png`

let html=`
<div class="item-header">
<img class="item-icon" src="${iconPath}" onerror="this.src='img/icons/default.png'">
<div>
<div class="unique">Unidentifiziert</div>
<div class="item-base">${current.base}</div>
</div>
</div>
`

current.stats.forEach(stat=>{
html+=`<div class="stat">${stat}</div>`
})

document.getElementById("tooltip").innerHTML=html

}

function checkAnswer(){

let guess=normalize(document.getElementById("guess").value)

let answers=[normalize(current.name)]

if(current.aliases){
current.aliases.forEach(a=>answers.push(normalize(a)))
}

if(answers.includes(guess)){

score+=10+(streak*2)
correct++
streak++

document.getElementById("result").innerHTML="✅ "+current.name

}else{

wrong++
streak=0

document.getElementById("result").innerHTML="❌ "+current.name

}

updateStats()

setTimeout(nextItem,900)

}

function updateStats(){

document.getElementById("score").innerText=score
document.getElementById("correct").innerText=correct
document.getElementById("wrong").innerText=wrong
document.getElementById("streak").innerText=streak

}

function highlightSuggestion(items){

for(let i=0;i<items.length;i++){
items[i].style.background=""
}

if(items[suggestionIndex]){
items[suggestionIndex].style.background="#444"
}

}

document.getElementById("guess").addEventListener("keydown",function(e){

let sug=document.getElementById("suggestions")
let items=sug.getElementsByClassName("suggestion")

if(e.key==="ArrowDown"){

e.preventDefault()

suggestionIndex++

if(suggestionIndex>=items.length) suggestionIndex=0

highlightSuggestion(items)

}

else if(e.key==="ArrowUp"){

e.preventDefault()

suggestionIndex--

if(suggestionIndex<0) suggestionIndex=items.length-1

highlightSuggestion(items)

}

else if(e.key==="Enter"){

if(suggestionIndex>=0 && items[suggestionIndex]){

this.value=items[suggestionIndex].innerText
sug.innerHTML=""
suggestionIndex=-1

}else{

checkAnswer()

}

}

})

document.getElementById("guess").addEventListener("input",function(){

let val=this.value.toLowerCase()

let sug=document.getElementById("suggestions")
sug.innerHTML=""

if(val.length<2) return

allNames.forEach(name=>{

if(name.toLowerCase().includes(val)){

let div=document.createElement("div")
div.className="suggestion"
div.innerText=name

div.onclick=function(){
document.getElementById("guess").value=name
sug.innerHTML=""
}

sug.appendChild(div)

}

})

})

const timer=setInterval(()=>{

time--
document.getElementById("time").innerText=time

if(time<=0){

alert("Spiel vorbei! Punkte: "+score)
location.reload()

}

},1000)

document.getElementById("highscore").innerText=localStorage.getItem("d2Highscore")||0

nextItem()

</script>

</body>
</html>
