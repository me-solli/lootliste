<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Identifiziere das Diablo Item</title>

<style>

body{
background:#000;
color:#c7b377;
font-family:Tahoma,Arial;
text-align:center;
}

h2{
color:#d4af37;
margin-top:30px;
}

#tooltip{
width:380px;
margin:30px auto;
padding:20px;
background:#000;
border:2px solid #666;
text-align:left;
font-size:15px;
box-shadow:0 0 25px black;
}

.item-header{
display:flex;
gap:12px;
align-items:center;
margin-bottom:12px;
}

.item-icon{
width:48px;
height:48px;
}

.unique{
color:#d4af37;
font-weight:bold;
font-size:18px;
}

.set{
color:#00ff00;
font-weight:bold;
font-size:18px;
}

.rare{
color:#ffff66;
font-weight:bold;
font-size:18px;
}

.item-base{
color:#888;
font-size:14px;
}

.stat{
color:#6da9ff;
margin-left:4px;
}

input{
background:#111;
border:1px solid #555;
color:white;
padding:8px;
width:260px;
margin-top:20px;
}

button{
margin-top:8px;
padding:6px 14px;
background:#333;
border:1px solid #777;
color:white;
cursor:pointer;
}

#suggestions{
position:absolute;
width:260px;
background:#111;
border:1px solid #444;
text-align:left;
left:50%;
transform:translateX(-50%);
z-index:1000;
}

.suggestion{
padding:6px;
cursor:pointer;
}

.suggestion:hover{
background:#333;
}

#stats{
margin-top:20px;
}

</style>
</head>

<body>

<h2>🧙 Identifiziere das Diablo Item</h2>

<div id="tooltip"></div>

<input id="guess" placeholder="Itemname eingeben">
<div id="suggestions"></div>

<br>

<button onclick="checkAnswer()">Identifizieren</button>
<button onclick="nextItem()">Überspringen</button>

<div id="result"></div>

<div id="stats">
Punkte: <span id="score">0</span> |
Richtig: <span id="correct">0</span> |
Falsch: <span id="wrong">0</span> |
Serie: <span id="streak">0</span> |
Zeit: <span id="time">120</span>
</div>

<div>
Highscore: <span id="highscore">0</span>
</div>

<script>

const items=[

{
name:"Windforce",
aliases:["wf","windmacht"],
base:"Hydrabogen",
icon:"bogen",
rarity:"unique",
stats:["+250% Schaden","Knockback"]
},

{
name:"Harlekinskrone",
aliases:["harle","shako"],
base:"Shako",
icon:"helm",
rarity:"unique",
stats:["+2 Fertigkeiten","10% Schadensreduzierung"]
},

{
name:"Stein von Jordan",
aliases:["soj"],
base:"Ring",
icon:"ring",
rarity:"unique",
stats:["+1 Fertigkeiten","+25% Mana"]
},

{
name:"Rabenfrost",
aliases:["raven frost"],
base:"Ring",
icon:"ring",
rarity:"unique",
stats:["+150 Angriffswert","+20 Geschicklichkeit","Cannot be Frozen"]
},

{
name:"Herold von Zakarum",
aliases:["hoz"],
base:"Gildenschild",
icon:"schild",
rarity:"unique",
stats:["+2 Paladin Skills","50% Block"]
},

{
name:"Der Oculus",
aliases:["occ","oculus","okulus"],
base:"Schleierstab",
icon:"zauberstab",
rarity:"unique",
stats:["+3 Sorc Skills","30% FCR"]
},

{
name:"Tal Rashas Horadrimwappen",
aliases:["tal helm"],
base:"Maske",
icon:"helm",
rarity:"set",
stats:["Life","Resistenzen"]
},

{
name:"Seltene Handschuhe",
aliases:["rare gloves"],
base:"Handschuhe",
icon:"handschuhe",
rarity:"rare",
stats:["20% IAS","+2 Skills"]
}

]

let current
let score=0
let correct=0
let wrong=0
let streak=0
let time=120
let suggestionIndex=-1

const allNames=[]

items.forEach(i=>{
allNames.push(i.name)
if(i.aliases) i.aliases.forEach(a=>allNames.push(a))
})

function normalize(t){
return t.toLowerCase().replace(/[^a-zäöüß]/g,"")
}

function rarityClass(r){
if(r==="set") return "set"
if(r==="rare") return "rare"
return "unique"
}

function nextItem(){

document.getElementById("guess").value=""
document.getElementById("result").innerHTML=""
document.getElementById("suggestions").innerHTML=""

suggestionIndex=-1

current=items[Math.floor(Math.random()*items.length)]

let icon=`img/icons/${current.icon}.png`

let html=`
<div class="item-header">
<img class="item-icon" src="${icon}" onerror="this.src='img/icons/default.png'">
<div>
<div class="${rarityClass(current.rarity)}">Unidentifiziert</div>
<div class="item-base">${current.base}</div>
</div>
</div>
`

current.stats.forEach(stat=>{
html+=`<div class="stat">${stat}</div>`
})

document.getElementById("tooltip").innerHTML=html

}

function checkAnswer(){

let guess=normalize(document.getElementById("guess").value)

let answers=[normalize(current.name)]

if(current.aliases){
current.aliases.forEach(a=>answers.push(normalize(a)))
}

if(answers.includes(guess)){

score+=10+(streak*2)
correct++
streak++

document.getElementById("result").innerHTML="✅ "+current.name

}else{

wrong++
streak=0

document.getElementById("result").innerHTML="❌ "+current.name

}

updateStats()

setTimeout(nextItem,800)

}

function updateStats(){

document.getElementById("score").innerText=score
document.getElementById("correct").innerText=correct
document.getElementById("wrong").innerText=wrong
document.getElementById("streak").innerText=streak

}

document.getElementById("guess").addEventListener("input",function(){

let val=this.value.toLowerCase()
let sug=document.getElementById("suggestions")
sug.innerHTML=""

if(val.length<2)return

allNames.forEach(name=>{

if(name.toLowerCase().includes(val)){

let div=document.createElement("div")
div.className="suggestion"
div.innerText=name

div.onclick=function(){
document.getElementById("guess").value=name
sug.innerHTML=""
}

sug.appendChild(div)

}

})

})

document.getElementById("guess").addEventListener("keydown",function(e){

let sug=document.getElementById("suggestions")
let items=sug.getElementsByClassName("suggestion")

if(e.key==="ArrowDown"){
suggestionIndex++
if(suggestionIndex>=items.length)suggestionIndex=0
highlight(items)
}

if(e.key==="ArrowUp"){
suggestionIndex--
if(suggestionIndex<0)suggestionIndex=items.length-1
highlight(items)
}

if(e.key==="Enter"){

if(items[suggestionIndex]){
this.value=items[suggestionIndex].innerText
sug.innerHTML=""
}else{
checkAnswer()
}

}

})

function highlight(items){

for(let i=0;i<items.length;i++){
items[i].style.background=""
}

if(items[suggestionIndex]){
items[suggestionIndex].style.background="#444"
}

}

const timer=setInterval(()=>{

time--
document.getElementById("time").innerText=time

if(time<=0){

alert("Spiel vorbei! Punkte: "+score)
location.reload()

}

},1000)

document.getElementById("highscore").innerText=
localStorage.getItem("d2Highscore")||0

nextItem()

</script>

</body>
</html>
