<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Artwork Downloads – D2R Lootliste</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Artwork Download Bereich der D2R Lootliste. KI-generierte Build-Visuals zum freien Download.">

  <link rel="stylesheet" href="../styles.css">
  
  <style>
    body {
      background:#0f0f13;
      color:#e5e5e5;
      font-family: Arial, sans-serif;
      margin:0;
    }

    .artwork-section {
      max-width:1000px;
      margin:60px auto;
      padding:0 20px;
      text-align:center;
    }

    h1 {
      margin-bottom:40px;
      font-size:28px;
      letter-spacing:1px;
    }

    .artwork-card img {
      width:100%;
      max-width:800px;
      border-radius:6px;
      box-shadow:0 10px 40px rgba(0,0,0,.6);
    }

    .artwork-actions {
      margin-top:20px;
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
    }

    .artwork-actions a {
      padding:10px 18px;
      background:#1c1c24;
      border:1px solid #2e2e3a;
      color:#e5e5e5;
      text-decoration:none;
      border-radius:4px;
      transition:.2s;
    }

    .artwork-actions a:hover {
      background:#2a2a36;
      border-color:#44445a;
    }

    .artwork-note {
      margin-top:40px;
      font-size:13px;
      opacity:.6;
    }
  </style>
</head>

<body>

<section class="artwork-section">
  <h1>Artwork Downloads</h1>

  <div class="artwork-card">
    <img src="../img/sorc-guide-hero.jpg" alt="Orb Fireball Sorc Artwork">

    <div class="artwork-actions">
      <a href="../img/sorc-guide-hero.jpg" target="_blank">Vergrößern</a>
      <a href="../img/sorc-guide-hero.jpg" download>Download</a>

  </p>

</body>
</html>
